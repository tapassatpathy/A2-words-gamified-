<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#FF9B00" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Woordje · Dutch A2</title>
<style>
  /* ============ Design tokens ============ */
  :root{
    --bg:#FFF8EF;
    --surface:#FFFFFF;
    --ink:#2B2B33;
    --muted:#8E8E98;
    --line:#ECECEC;
    --orange:#FF9B00;
    --orange-dark:#D97F00;
    --green:#58CC02;
    --green-dark:#46A302;
    --red:#FF4B4B;
    --red-dark:#D63B3B;
    --blue:#1CB0F6;
    --blue-dark:#1690CC;
    --gold:#FFC800;
    --radius:18px;
    --safe-top:env(safe-area-inset-top, 0px);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
    --footer-h:64px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN",
                "Nunito",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-weight:700;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overscroll-behavior-y:none;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
  }
  .app{
    max-width:520px;margin:0 auto;min-height:100%;
    display:flex;flex-direction:column;position:relative;
  }

  /* ============ Header ============ */
  header.top{
    position:sticky;top:0;z-index:20;
    padding:calc(var(--safe-top) + 12px) 16px 12px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .stats-row{display:flex;align-items:center;gap:10px;}
  .stat{
    display:flex;align-items:center;gap:5px;
    font-size:17px;line-height:1;white-space:nowrap;
  }
  .stat .ico{font-size:19px;}
  .stat.streak{color:var(--orange);}
  .stat.xp{color:var(--gold);}
  .stat.spacer{flex:1;}
  .progress-track{
    margin-top:11px;height:14px;border-radius:99px;
    background:var(--line);overflow:hidden;position:relative;
  }
  .progress-fill{
    height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--orange),#FFB740);
    width:0%;transition:width .55s cubic-bezier(.2,.8,.2,1);
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.08);
  }
  .progress-label{
    margin-top:6px;font-size:12px;color:var(--muted);font-weight:800;
    letter-spacing:.02em;text-transform:uppercase;
  }

  /* ============ Main ============ */
  main{
    flex:1;padding:18px 16px;
    padding-bottom:calc(var(--footer-h) + var(--safe-bottom) + 18px);
  }
  .screen{display:none;animation:slideUp .32s cubic-bezier(.2,.8,.2,1);}
  .screen.active{display:block;}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

  h1.greet{font-size:26px;margin:2px 0 2px;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:15px;font-weight:700;margin:0 0 18px;}

  /* ===== Level cards ===== */
  .level-card{
    position:relative;background:var(--surface);
    border:2px solid var(--line);border-bottom-width:5px;
    border-radius:var(--radius);padding:16px;margin-bottom:14px;
    display:flex;align-items:center;gap:14px;
    transition:transform .08s ease;
  }
  .level-card.unlocked:active{transform:translateY(2px);border-bottom-width:3px;}
  .level-card.locked{opacity:.62;}
  .level-badge{
    width:54px;height:54px;flex:0 0 auto;border-radius:16px;
    display:grid;place-items:center;font-size:26px;color:#fff;
    background:var(--orange);box-shadow:0 4px 0 var(--orange-dark);
  }
  .level-card.locked .level-badge{background:#C9C9CF;box-shadow:0 4px 0 #ADADB5;}
  .level-card.done .level-badge{background:var(--green);box-shadow:0 4px 0 var(--green-dark);}
  .level-meta{flex:1;min-width:0;}
  .level-meta .name{font-size:18px;line-height:1.15;}
  .level-meta .cat{color:var(--muted);font-size:13px;font-weight:700;margin-top:3px;}
  .level-meta .bestbar{
    margin-top:8px;height:8px;border-radius:99px;background:var(--line);overflow:hidden;
  }
  .level-meta .bestbar > i{display:block;height:100%;background:var(--green);border-radius:99px;}
  .level-chevron{font-size:20px;color:var(--muted);}

  .review-tile{
    background:linear-gradient(135deg,#1CB0F6,#0E8FD1);
    color:#fff;border:none;border-bottom:5px solid var(--blue-dark);
    border-radius:var(--radius);padding:16px;margin-bottom:18px;width:100%;
    display:flex;align-items:center;gap:14px;text-align:left;
    transition:transform .08s ease;
  }
  .review-tile:active{transform:translateY(2px);border-bottom-width:3px;}
  .review-tile .rico{font-size:30px;}
  .review-tile .rmeta .rname{font-size:18px;}
  .review-tile .rmeta .rsub{font-size:13px;opacity:.9;font-weight:700;margin-top:2px;}

  /* ===== Game ===== */
  .game-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .icon-btn{
    width:48px;height:48px;flex:0 0 auto;border-radius:12px;border:2px solid var(--line);
    background:var(--surface);display:grid;place-items:center;font-size:20px;color:var(--muted);
  }
  .icon-btn:active{transform:scale(.94);}
  .qbar-track{flex:1;height:16px;border-radius:99px;background:var(--line);overflow:hidden;}
  .qbar-fill{height:100%;border-radius:99px;background:var(--green);width:0%;
    transition:width .35s cubic-bezier(.2,.8,.2,1);}

  .prompt-label{color:var(--muted);font-size:14px;font-weight:800;text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:14px;}
  .word-card{
    background:var(--surface);border:2px solid var(--line);border-radius:22px;
    padding:34px 22px;text-align:center;margin-bottom:8px;
    box-shadow:0 6px 0 rgba(0,0,0,.04);
  }
  .word-card .word{font-size:34px;line-height:1.1;letter-spacing:-.01em;}
  .word-card .speak{margin-top:14px;display:inline-flex;align-items:center;gap:7px;
    color:var(--blue);font-size:14px;background:none;border:none;}
  .word-card .speak .ico{font-size:20px;}

  .choices{margin-top:22px;display:flex;flex-direction:column;gap:12px;}
  .choice{
    width:100%;min-height:56px;border-radius:16px;background:var(--surface);
    border:2px solid var(--line);border-bottom-width:4px;
    color:var(--ink);font-size:18px;font-family:inherit;font-weight:800;
    padding:14px 18px;text-align:left;transition:transform .08s,background .12s,border-color .12s;
  }
  .choice:active{transform:translateY(2px);border-bottom-width:2px;}
  .choice.correct{background:#E8FAD9;border-color:var(--green);color:var(--green-dark);}
  .choice.wrong{background:#FFE9E9;border-color:var(--red);color:var(--red-dark);}
  .choice.dim{opacity:.5;}
  .choice[disabled]{pointer-events:none;}

  /* feedback footer */
  .feedback{
    position:fixed;left:0;right:0;
    bottom:calc(var(--footer-h) + var(--safe-bottom));
    transform:translateY(130%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
    z-index:30;padding:18px 16px calc(18px);
  }
  .feedback.show{transform:translateY(0);}
  .feedback.ok{background:#E8FAD9;}
  .feedback.no{background:#FFE9E9;}
  .feedback .fb-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .feedback .fb-ico{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
    font-size:24px;color:#fff;flex:0 0 auto;}
  .feedback.ok .fb-ico{background:var(--green);}
  .feedback.no .fb-ico{background:var(--red);}
  .feedback .fb-text .t{font-size:18px;}
  .feedback.ok .fb-text .t{color:var(--green-dark);}
  .feedback.no .fb-text .t{color:var(--red-dark);}
  .feedback .fb-text .s{font-size:14px;font-weight:700;color:var(--ink);opacity:.8;margin-top:1px;}
  .fb-continue{
    flex:0 0 auto;border:none;border-radius:13px;color:#fff;font-family:inherit;font-weight:800;
    font-size:14px;text-transform:uppercase;letter-spacing:.03em;padding:12px 16px;
  }
  .feedback.ok .fb-continue{background:var(--green);box-shadow:0 4px 0 var(--green-dark);}
  .feedback.no .fb-continue{background:var(--red);box-shadow:0 4px 0 var(--red-dark);}
  .fb-continue:active{transform:translateY(3px);box-shadow:none;}

  /* big action button */
  .btn-primary{
    width:100%;border:none;border-radius:16px;color:#fff;font-family:inherit;
    font-size:18px;font-weight:800;letter-spacing:.02em;padding:16px;
    background:var(--green);box-shadow:0 5px 0 var(--green-dark);
    transition:transform .07s,box-shadow .07s;text-transform:uppercase;
  }
  .btn-primary:active{transform:translateY(4px);box-shadow:0 1px 0 var(--green-dark);}
  .btn-primary.orange{background:var(--orange);box-shadow:0 5px 0 var(--orange-dark);}
  .btn-primary.orange:active{box-shadow:0 1px 0 var(--orange-dark);}
  .btn-ghost{
    width:100%;border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;
    background:var(--surface);color:var(--muted);font-family:inherit;font-size:16px;
    font-weight:800;padding:14px;margin-top:12px;text-transform:uppercase;letter-spacing:.02em;
  }
  .btn-ghost:active{transform:translateY(2px);border-bottom-width:2px;}

  /* ===== Results ===== */
  .results-wrap{text-align:center;padding-top:12px;}
  .trophy{font-size:74px;margin:8px 0 4px;animation:pop .5s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
  .results-title{font-size:28px;margin:2px 0;}
  .results-sub{color:var(--muted);font-size:15px;margin-bottom:22px;}
  .result-stats{display:flex;gap:12px;margin-bottom:22px;}
  .rstat{flex:1;background:var(--surface);border:2px solid var(--line);border-bottom-width:4px;
    border-radius:16px;padding:14px 8px;}
  .rstat .big{font-size:26px;}
  .rstat .lab{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:3px;}
  .rstat.acc .big{color:var(--green);}
  .rstat.xp .big{color:var(--gold);}
  .rstat.streak .big{color:var(--orange);}

  /* ===== Progress screen ===== */
  .panel{background:var(--surface);border:2px solid var(--line);border-bottom-width:4px;
    border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .panel h3{margin:0 0 4px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .big-grid{display:flex;gap:12px;margin-bottom:14px;}
  .big-grid .cell{flex:1;background:var(--surface);border:2px solid var(--line);border-bottom-width:4px;
    border-radius:16px;padding:16px 10px;text-align:center;}
  .big-grid .cell .n{font-size:30px;}
  .big-grid .cell .l{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:4px;}
  .lvl-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .lvl-row:last-child{border-bottom:none;}
  .lvl-row .dot{width:11px;height:11px;border-radius:50%;background:var(--line);flex:0 0 auto;}
  .lvl-row .dot.done{background:var(--green);}
  .lvl-row .nm{flex:1;font-size:15px;}
  .lvl-row .sc{font-size:14px;color:var(--muted);}
  .lvl-row .sc.good{color:var(--green);}
  .danger{color:var(--red);background:none;border:none;font-family:inherit;font-weight:800;
    font-size:14px;padding:8px 0;width:100%;text-align:center;text-transform:uppercase;letter-spacing:.03em;}

  /* ===== Footer nav ===== */
  nav.bottom{
    position:fixed;left:0;right:0;bottom:0;z-index:25;
    height:calc(var(--footer-h) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    background:var(--surface);border-top:1px solid var(--line);
    display:flex;
  }
  nav.bottom .nav-inner{max-width:520px;margin:0 auto;width:100%;display:flex;}
  .nav-btn{flex:1;border:none;background:none;font-family:inherit;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .nav-btn .ico{font-size:23px;line-height:1;}
  .nav-btn.active{color:var(--orange);}
  .nav-btn:active{transform:scale(.93);}

  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}
    40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

  .empty{text-align:center;color:var(--muted);font-size:15px;padding:40px 10px;font-weight:700;}
  .empty .e-ico{font-size:48px;display:block;margin-bottom:10px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
  }
</style>
</head>

<div class="app">
  <!-- ============ HEADER ============ -->
  <header class="top">
    <div class="stats-row">
      <span class="stat streak"><span class="ico">🔥</span><span id="hdrStreak">0</span></span>
      <span class="stat xp"><span class="ico">⭐</span><span id="hdrXp">0</span></span>
      <span class="stat spacer"></span>
      <span class="stat" style="color:var(--green)"><span class="ico">🏅</span><span id="hdrLevels">0/5</span></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="hdrProgress"></div></div>
    <div class="progress-label" id="hdrProgressLabel">Course progress</div>
  </header>

  <!-- ============ MAIN ============ -->
  <main>
    <!-- ===== MENU ===== -->
    <section class="screen active" id="screen-menu">
      <h1 class="greet" id="greetLine">Goedendag! 👋</h1>
      <p class="sub">Pick a unit and learn 10 words at a time.</p>
      <button class="review-tile" id="reviewTile" style="display:none" onclick="startReview()">
        <span class="rico">🃏</span>
        <span class="rmeta">
          <span class="rname">Review Deck</span>
          <span class="rsub"><span id="reviewCount">0</span> words to practise</span>

    <!-- ===== GAME ===== -->
    <section class="screen" id="screen-game">

        <div class="qbar-track"><div class="qbar-fill" id="qbarFill"></div></div>

      <div class="prompt-label" id="promptLabel">Translate to English</div>

      </div>
      <div class="choices" id="choices"></div>
    </section>

    <!-- ===== RESULTS ===== -->
    <section class="screen" id="screen-results">
      <div class="results-wrap">
        <div class="trophy" id="resultTrophy">🏆</div>
        <h2 class="results-title" id="resultTitle">Round complete!</h2>
        <p class="results-sub" id="resultSub"></p>
        <div class="result-stats">
          <div class="rstat acc"><div class="big" id="resAcc">0%</div><div class="lab">Accuracy</div></div>
          <div class="rstat xp"><div class="big" id="resXp">+0</div><div class="lab">XP</div></div>
          <div class="rstat streak"><div class="big" id="resStreak">0</div><div class="lab">Streak</div></div>
        </div>
        <button class="btn-primary" id="resPrimary" onclick="resultPrimary()">Continue</button>
        <button class="btn-ghost" onclick="goMenu()">Back to units</button>
      </div>
    </section>

    <!-- ===== PROGRESS ===== -->
    <section class="screen" id="screen-progress">
      <h1 class="greet">Your progress</h1>
      <p class="sub">Every round keeps the streak alive.</p>
      <div class="big-grid">
        <div class="cell"><div class="n" style="color:var(--orange)" id="pStreak">0</div><div class="l">🔥 Day streak</div></div>
        <div class="cell"><div class="n" style="color:var(--gold)" id="pXp">0</div><div class="l">⭐ Total XP</div></div>
      </div>
      <div class="panel">
        <h3>Units mastered</h3>
        <div id="pLevels"></div>
      </div>
      <div class="panel">
        <h3>Review deck</h3>
        <div id="pReview" class="lvl-row" style="border:none;padding:6px 0;">
          <span class="nm">Words to revisit</span>
          <span class="sc" id="pReviewCount">0</span>
        </div>
        <button class="btn-primary orange" id="pReviewBtn" style="margin-top:8px" onclick="startReview()">Practise review deck</button>
      </div>
      <div class="panel">
        <button class="danger" onclick="resetAll()">Reset all progress</button>
      </div>
    </section>
  </main>

  <!-- feedback slide-up -->
  <div class="feedback" id="feedback">
    <div class="fb-inner">
      <div class="fb-ico" id="fbIco">✓</div>
      <div class="fb-text" style="flex:1;"><div class="t" id="fbTitle">Nice!</div><div class="s" id="fbSub"></div></div>
      <button class="fb-continue" id="fbContinue" onclick="next()">Continue</button>
    </div>
  </div>

  <!-- ============ FOOTER ============ -->
  <nav class="bottom">
    <div class="nav-inner">
      <button class="nav-btn active" id="nav-learn" onclick="goMenu()">
        <span class="ico">🏠</span>Learn
      </button>
      <button class="nav-btn" id="nav-progress" onclick="goProgress()">
        <span class="ico">📊</span>Progress
      </button>
    </div>
  </nav>
</div>

const LEVELS = [
  {level:1, name:"Unit 1 · Basics",            emoji:"🌱"},
  {level:2, name:"Unit 2 · Family & Housing",  emoji:"🏡"},
  {level:3, name:"Unit 3 · Shopping & Food",   emoji:"🛒"},
  {level:4, name:"Unit 4 · Work & Education",  emoji:"💼"},
  {level:5, name:"Unit 5 · Inburgering",       emoji:"🏛️"},
];

const Q_PER_ROUND = 10;
const PASS = 0.8;          // 80% to unlock next unit
const XP_PER_CORRECT = 10;
const XP_ROUND_BONUS = 20;

/* =========================================================
   STATE / PERSISTENCE
   ========================================================= */
const STORE_KEY = "woordje_a2_v1";
const defaultState = ()=>({
  xp:0,
  streak:0,
  lastPlayed:null,            // yyyy-mm-dd
  bestScore:{},               // {level: 0..1}
  reviewIds:[],               // wrong-answer word ids
});
let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}

/* =========================================================
   HELPERS
   ========================================================= */
const $ = id => document.getElementById(id);
const todayStr = ()=> new Date().toLocaleDateString("en-CA"); // yyyy-mm-dd, local
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function levelUnlocked(lvl){
  if(lvl===1) return true;
  return (state.bestScore[lvl-1]||0) >= PASS;
}
function levelDone(lvl){ return (state.bestScore[lvl]||0) >= PASS; }
function levelsMastered(){ return LEVELS.filter(l=>levelDone(l.level)).length; }

/* daily streak: bump only when a round is finished */
function bumpStreak(){
  const t = todayStr();
  if(state.lastPlayed === t) return; // already counted today
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toLocaleDateString("en-CA");
  if(state.lastPlayed === yesterday) state.streak += 1;
  else state.streak = 1;            // first ever, or a gap → restart at 1
  state.lastPlayed = t;
}

/* =========================================================
   AUDIO + HAPTICS (graceful, optional)
   ========================================================= */
let actx=null;
function beep(freq, dur, type){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended") actx.resume();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    o.connect(g); g.connect(actx.destination);
    const now=actx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.18, now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.start(now); o.stop(now+dur);
  }catch(e){}
}
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms);}catch(e){} }
function fxCorrect(){ beep(660,0.09,"triangle"); setTimeout(()=>beep(990,0.13,"triangle"),90); buzz(18);}
function fxWrong(){ beep(200,0.18,"sawtooth"); buzz([40,40,40]); }
function speakWord(){
  try{
    const u=new SpeechSynthesisUtterance(round?round.q[round.idx].word.replace(/^De |^Het /,""):"");
    u.lang="nl-NL"; u.rate=0.9; speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}
function setNav(which){
  $("nav-learn").classList.toggle("active", which==="learn");
  $("nav-progress").classList.toggle("active", which==="progress");
}
function goMenu(){ round=null; hideFeedback(); renderMenu(); showScreen("screen-menu"); setNav("learn"); }
function goProgress(){ hideFeedback(); renderProgress(); showScreen("screen-progress"); setNav("progress"); }

/* =========================================================
   HEADER
   ========================================================= */
function renderHeader(){
  $("hdrStreak").textContent = state.streak;
  $("hdrXp").textContent = state.xp;
  const done = levelsMastered();
  $("hdrLevels").textContent = done+"/"+LEVELS.length;
  const pct = Math.round(done/LEVELS.length*100);
  $("hdrProgress").style.width = pct+"%";
  $("hdrProgressLabel").textContent = done===LEVELS.length ? "Course complete 🎉" : "Course progress · "+pct+"%";
}

/* =========================================================
   MENU
   ========================================================= */
function greetByTime(){
  const h=new Date().getHours();
  if(h<6) return "Goedenacht 🌙";
  if(h<12) return "Goedemorgen ☀️";
  if(h<18) return "Goedemiddag 👋";
  return "Goedenavond 🌆";
}
function renderMenu(){
  renderHeader();
  $("greetLine").textContent = greetByTime();

  // review tile
  if(state.reviewIds.length){
    $("reviewTile").style.display="flex";
    $("reviewCount").textContent = state.reviewIds.length;
  }else{
    $("reviewTile").style.display="none";
  }

  const list = $("levelList"); list.innerHTML="";
  LEVELS.forEach(L=>{
    const unlocked = levelUnlocked(L.level);
    const done = levelDone(L.level);
    const best = Math.round((state.bestScore[L.level]||0)*100);
    const card = document.createElement(unlocked?"button":"div");
    card.className = "level-card "+(unlocked?"unlocked ":"locked ")+(done?"done":"");
    card.style.cssText="appearance:none;font-family:inherit;text-align:left;width:100%;";
    if(unlocked) card.onclick = ()=>startRound(L.level);
    card.innerHTML = `
      <div class="level-badge">${unlocked?(done?"✓":L.emoji):"🔒"}</div>
      <div class="level-meta">
        <div class="name">${L.name}</div>
        <div class="cat">${unlocked ? (done?("Mastered · best "+best+"%"):(best>0?("Best "+best+"% · 80% to pass"):"10 words · 80% to pass"))
                                     : "Finish the previous unit to unlock"}</div>
        ${best>0?`<div class="bestbar"><i style="width:${best}%"></i></div>`:""}
      </div>
      <div class="level-chevron">${unlocked?"›":""}</div>`;
    list.appendChild(card);
  });
}

/* =========================================================
   GAME ENGINE
   ========================================================= */
let round = null; // {mode, level, q:[{word,answer,article,options:[]}], idx, correct, wrongIds:[], locked}

function buildQuestions(words, pool){
  return shuffle(words).slice(0, Q_PER_ROUND).map(w=>{
    const distractPool = shuffle(pool.filter(x=>x.id!==w.id && x.english!==w.english));
    const opts = shuffle([w.english, ...distractPool.slice(0,3).map(x=>x.english)]);
    return {id:w.id, word:w.dutch, answer:w.english, options:opts};
  });
}

function startRound(level){
  const words = VOCAB.filter(w=>w.level===level);
  round = {
    mode:"level", level,
    q: buildQuestions(words, words.length>=4?words:VOCAB),
    idx:0, correct:0, wrongIds:[], locked:false
  };
  enterGame("Unit "+level);
}

function startReview(){
  if(!state.reviewIds.length){ goMenu(); return; }
  const words = state.reviewIds.map(id=>VOCAB.find(w=>w.id===id)).filter(Boolean);
  round = {
    mode:"review", level:null,
    q: shuffle(words).slice(0, Math.min(Q_PER_ROUND, words.length))
         .map(w=>{
           const opts = shuffle([w.english, ...shuffle(VOCAB.filter(x=>x.id!==w.id && x.english!==w.english)).slice(0,3).map(x=>x.english)]);
           return {id:w.id, word:w.dutch, answer:w.english, options:opts};
         }),
    idx:0, correct:0, wrongIds:[], clearedIds:[], locked:false
  };
  enterGame("Review");
}

function enterGame(label){
  hideFeedback();
  $("promptLabel").textContent = "Translate to English";
  showScreen("screen-game"); setNav("learn");
  renderQuestion();
}

function renderQuestion(){
  round.locked=false;
  const q = round.q[round.idx];
  $("wordText").textContent = q.word;
  $("qbarFill").style.width = (round.idx/round.q.length*100)+"%";
  const box = $("choices"); box.innerHTML="";
  q.options.forEach(opt=>{
    const b=document.createElement("button");
    b.className="choice"; b.textContent=opt;
    b.onclick=()=>answer(b, opt, q);
    box.appendChild(b);
  });
}

function answer(btn, opt, q){
  if(round.locked) return;
  round.locked=true;
  const correct = opt===q.answer;
  const buttons=[...document.querySelectorAll("#choices .choice")];
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  if(correct){
    round.correct++;
    fxCorrect();
    if(round.mode==="review"){ round.clearedIds.push(q.id); }
    showFeedback(true, q);
  }else{
    if(!round.wrongIds.includes(q.id)) round.wrongIds.push(q.id);
    btn.classList.add("shake");
    fxWrong();
    showFeedback(false, q);
  }
}

function showFeedback(ok, q){
  const fb=$("feedback");
  fb.className="feedback show "+(ok?"ok":"no");
  $("fbIco").textContent = ok?"✓":"✕";
  $("fbTitle").textContent = ok ? ["Nice!","Goed zo!","Correct!","Top!"][Math.floor(Math.random()*4)] : "Correct answer:";
  $("fbSub").textContent = ok ? (q.word+" = "+q.answer) : (q.word+" = "+q.answer);
}
function hideFeedback(){ const fb=$("feedback"); fb.className="feedback"; }

function next(){
  hideFeedback();
  round.idx++;
  if(round.idx>=round.q.length){ finishRound(); return; }
  renderQuestion();
}

function finishRound(){
  $("qbarFill").style.width="100%";
  const total = round.q.length;
  const acc = round.correct/total;

  // XP
  const gained = round.correct*XP_PER_CORRECT + (acc>=PASS?XP_ROUND_BONUS:0);
  state.xp += gained;

  // streak (any completed round counts for today)
  bumpStreak();

  // best score for level
  if(round.mode==="level"){
    state.bestScore[round.level] = Math.max(state.bestScore[round.level]||0, acc);
  }

  // review deck maintenance
  // add freshly-missed words
  round.wrongIds.forEach(id=>{ if(!state.reviewIds.includes(id)) state.reviewIds.push(id); });
  // in review mode, remove words answered correctly
  if(round.mode==="review" && round.clearedIds){
    state.reviewIds = state.reviewIds.filter(id=>!round.clearedIds.includes(id) || round.wrongIds.includes(id));
  }
  save();
  showResults(acc, gained);
}

/* =========================================================
   RESULTS
   ========================================================= */
function showResults(acc, gained){
  const pct=Math.round(acc*100);
  const passed = acc>=PASS;
  renderHeader();

  $("resAcc").textContent = pct+"%";
  $("resXp").textContent = "+"+gained;
  $("resStreak").textContent = state.streak;

  if(round.mode==="review"){
    $("resultTrophy").textContent = "🃏";
    $("resultTitle").textContent = "Review done!";
    $("resultSub").textContent = state.reviewIds.length
        ? state.reviewIds.length+" word(s) still in your deck."
        : "Your review deck is empty — well done!";
    $("resPrimary").textContent = "Back to units";
    $("resPrimary").dataset.action = "menu";
  }else if(passed){
    const nextLvl = round.level+1;
    const lastUnit = round.level>=LEVELS.length;
    $("resultTrophy").textContent = pct===100 ? "🌟" : "🏆";
    $("resultTitle").textContent = pct===100 ? "Perfect round!" : "Unit passed!";
    $("resultSub").textContent = lastUnit
        ? "You finished the final unit. Heel goed gedaan!"
        : ("Unit "+nextLvl+" is now unlocked.");
    $("resPrimary").textContent = lastUnit ? "Back to units" : "Next unit";
    $("resPrimary").dataset.action = lastUnit ? "menu" : ("level:"+nextLvl);
  }else{
    $("resultTrophy").textContent = "💪";
    $("resultTitle").textContent = "Keep going!";
    $("resultSub").textContent = "You need 80% to pass. Missed words are saved to your review deck.";
    $("resPrimary").textContent = "Try again";
    $("resPrimary").dataset.action = "level:"+round.level;
  }
  showScreen("screen-results"); setNav("learn");
}
function resultPrimary(){
  const a=$("resPrimary").dataset.action||"menu";
  if(a==="menu") return goMenu();
  if(a.startsWith("level:")) return startRound(parseInt(a.split(":")[1],10));
  goMenu();
}

/* =========================================================
   PROGRESS SCREEN
   ========================================================= */
function renderProgress(){
  renderHeader();
  $("pStreak").textContent = state.streak;
  $("pXp").textContent = state.xp;

  const box=$("pLevels"); box.innerHTML="";
  LEVELS.forEach(L=>{
    const best=Math.round((state.bestScore[L.level]||0)*100);
    const done=levelDone(L.level);
    const row=document.createElement("div");
    row.className="lvl-row";
    row.innerHTML=`<span class="dot ${done?'done':''}"></span>
      <span class="nm">${L.name}</span>
      <span class="sc ${done?'good':''}">${best>0?best+"%":(levelUnlocked(L.level)?"—":"🔒")}</span>`;
    box.appendChild(row);
  });

  $("pReviewCount").textContent = state.reviewIds.length;
  $("pReviewBtn").style.display = state.reviewIds.length ? "block":"none";
  if(!state.reviewIds.length){
    $("pReviewCount").textContent = "Empty 🎉";
  }
}

/* =========================================================
   MISC ACTIONS
   ========================================================= */
function confirmQuit(){
  if(confirm("Quit this round? Your progress in this round won't be saved.")) goMenu();
}
function resetAll(){
  if(confirm("Reset ALL progress — XP, streak, units and review deck?")){
    state = defaultState(); save(); goMenu();
  }
}

/* =========================================================
   INIT
   ========================================================= */
// keep streak number honest on load (if a day was skipped, the count still

try{
  renderHeader();
  renderMenu();
  showScreen("screen-menu");
  setNav("learn");

    '<h2 style="color:#FF4B4B">Something went wrong loading the app</h2>'+
    '<p style="color:#2B2B33">'+(err&&err.message?String(err.message):"Unknown error")+'</p>'+
    '<p style="color:#8E8E98;font-size:14px">If you are viewing this in a file preview, '+
    'open it via an https:// link instead (GitHub Pages / Netlify Drop).</p></div>';
}
